{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Manage WFH Requests</h2>

<table class="w-full bg-white shadow">

<thead class="bg-gray-200">

<tr>

<th class="p-3">Employee</th>
<th class="p-3">Date</th>
<th class="p-3">Reason</th>
<th class="p-3">Status</th>
<th class="p-3">Action</th>

</tr>

</thead>

<tbody>

{% for req in requests %}

<tr class="border-b">

<td class="p-3">{{ req.user.username }}</td>
<td class="p-3">{{ req.date }}</td>
<td class="p-3">{{ req.reason }}</td>
<td class="p-3">{{ req.status }}</td>

<td class="p-3">

{% if req.status == "Pending" %}

<a href="/wfh/approve/{{ req.id }}/"
class="bg-green-500 text-white px-3 py-1 rounded">
Approve
</a>

<a href="/wfh/reject/{{ req.id }}/"
class="bg-red-500 text-white px-3 py-1 rounded">
Reject
</a>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
