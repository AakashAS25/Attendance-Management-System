{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">
WFH Status Tracker
</h2>

<div class="bg-white shadow rounded">

<table class="w-full">

<thead class="bg-gray-200">

<tr>

<th class="p-3 text-left">Date</th>
<th class="p-3 text-left">Reason</th>
<th class="p-3 text-left">Status</th>

</tr>

</thead>

<tbody>

{% for req in requests %}

<tr class="border-b">

<td class="p-3">{{ req.date }}</td>
<td class="p-3">{{ req.reason }}</td>

<td class="p-3">

{% if req.status == "Approved" %}

<span class="bg-green-200 text-green-800 px-3 py-1 rounded">
Approved
</span>

{% elif req.status == "Rejected" %}

<span class="bg-red-200 text-red-800 px-3 py-1 rounded">
Rejected
</span>

{% else %}

<span class="bg-yellow-200 text-yellow-800 px-3 py-1 rounded">
Pending
</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
